# Model architecture and sampling defaults for LDSR-S2.
apply_normalization: false
ckpt_version: "opensr-ldsrs2_v1_0_0.ckpt"
encode_conditioning: true

denoiser_settings:
  linear_start: 0.0001
  linear_end: 0.0155
  timesteps: 1000
  parameterization: "eps"
  sampling_eta: 0.95
  sampling_temperature: 1.0
  sampling_steps: 100

first_stage_config:
  embed_dim: 4
  double_z: true
  z_channels: 4
  resolution: 512
  in_channels: 4
  out_ch: 4
  ch: 128
  ch_mult: [1, 2, 4]
  num_res_blocks: 2
  attn_resolutions: []
  dropout: 0.0

cond_stage_config:
  image_size: 128
  in_channels: 8
  model_channels: 160
  out_channels: 4
  num_res_blocks: 2
  attention_resolutions: [16, 8]
  channel_mult: [1, 2, 2, 4]
  num_head_channels: 32

other:
  concat_mode: true
  cond_stage_trainable: false
  first_stage_key: "image"
  cond_stage_key: "LR_image"
